name: Update subscriptions

on:
  push:
    branches:
      - main
    paths-ignore:
      - "dist/**"
  workflow_dispatch:
  schedule:
    # Beijing 08:00 = UTC 00:00
    - cron: "0 0 * * *"

permissions:
  contents: write

concurrency:
  group: update-subscriptions
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Generate subscription files
        run: npm run update
        env:
          BASE_URL: https://cdn.jsdelivr.net/gh/${{ github.repository }}@main/dist
          MAX_PER_COUNTRY: "100"
          SOURCE_LIMIT: "8"
          MAX_TEST_NODES: "1500"
          FETCH_TIMEOUT_MS: "12000"
          TEST_TIMEOUT_MS: "2500"
          TEST_CONCURRENCY: "240"

      - name: Check generated output
        run: npm run check

      - name: Commit generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f dist
          if git diff --cached --quiet; then
            echo "No generated changes to commit."
          else
            git commit -m "Update generated subscriptions [skip ci]"
            git push
          fi
